# Blog Post Workflow
# Automatically updates your README with your latest blog posts
# Works with Dev.to, Medium, WordPress, and other RSS feeds

name: Latest Blog Posts

on:
  schedule:
    # Runs every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pull in Dev.to posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dev.to/feed/nishal21"
          max_post_count: 5
          readme_path: ./README.md
          comment_tag_name: "BLOG"
          template: '<tr><td><a href="$url">$title</a></td><td>$date</td></tr>'
          date_format: "mmm d, yyyy"
          commit_message: "Updated README with latest blog posts"

# SETUP INSTRUCTIONS:
# 1. Add this marker in your README.md where you want the blog posts to appear:
#    <!-- BLOG:START -->
#    <!-- BLOG:END -->
# 2. The workflow will automatically populate content between these markers
# 3. For multiple RSS feeds, separate URLs with commas
# 4. Example for multiple feeds:
#    feed_list: "https://dev.to/feed/nishal21,https://medium.com/feed/@your-username"
