# GitHub Contribution Snake Animation
# This workflow generates a snake animation from your contribution graph
# The snake eats your contributions and updates daily

name: Generate Snake Animation

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"  # Runs at 00:00 UTC every day
  
  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main branch (optional, for testing)
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Generate the snake animations
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: nishal21
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color-snake=#58A6FF&color-dots=#0D1117,#0e4429,#006d32,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the generated files to the output branch
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# After this runs, your snake animation will be available at:
# https://raw.githubusercontent.com/nishal21/nishal21/output/github-contribution-grid-snake-dark.svg
