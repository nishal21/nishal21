# WakaTime Stats in README
# Shows your coding time statistics in your profile
# Requires WakaTime account and API key

name: WakaTime Stats

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with WakaTime Stats
    runs-on: ubuntu-latest

    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_COMMIT: "True"
          SHOW_LANGUAGE: "False"
          SHOW_LOC_CHART: "False"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_SHORT_INFO: "True"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
          LOCALE: "en"

# SETUP INSTRUCTIONS:
# 1. Create a WakaTime account at https://wakatime.com
# 2. Install WakaTime plugin in your IDE
# 3. Get your API key from https://wakatime.com/settings/api-key
# 4. Add the API key as a secret in your repository:
#    - Go to repo Settings > Secrets and variables > Actions
#    - Add a new secret named WAKATIME_API_KEY
#    - Paste your API key as the value
